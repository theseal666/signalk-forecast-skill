  <text x="235" y="250" fill="#5f5f5f" font-size="12">— ranked by how close each model has been. Hover any figure for what it means.</text>

  <!-- rank card 1 (top) -->
  <rect x="24" y="266" width="1464" height="60" rx="8" fill="#172019" stroke="#2f6b57"/>
  <text x="52" y="303" fill="#2fd1b0" font-size="22" font-weight="bold" text-anchor="middle">1</text>
  <text x="92" y="292" fill="#e8e8e8" font-size="16" font-weight="bold">MET Norway Nordic</text>
  <text x="92" y="312" fill="#9fb0aa" font-size="13">≈26° off · reads +4° (right) · catches 9/11 shifts · beats “no change” from 3h</text>
  <rect x="92" y="316" width="1250" height="6" rx="3" fill="#262626"/>
  <rect x="92" y="316" width="912" height="6" rx="3" fill="#79b23a"/>
