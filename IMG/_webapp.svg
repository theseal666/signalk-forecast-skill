  <!-- section: horizon -->
  <text x="24" y="566" fill="#8a8a8a" font-size="12" letter-spacing="1">DOES THE PICK CHANGE BY FORECAST HORIZON?</text>
  <text x="560" y="566" fill="#5f5f5f" font-size="12">— who is best now vs. later. If it flips, that is your reason to switch.</text>

  <rect x="24" y="582" width="474" height="58" rx="8" fill="#1a1a1a" stroke="#2a2a2a"/>
  <text x="42" y="606" fill="#777" font-size="11" letter-spacing="1">NOW → 3 H</text>
  <text x="42" y="628" fill="#e8e8e8" font-size="16" font-weight="bold">MET Norway Nordic</text>
