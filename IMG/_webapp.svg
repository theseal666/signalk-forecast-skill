  <text x="92" y="496" fill="#e8e8e8" font-size="16" font-weight="bold">NOAA GFS</text>
  <text x="92" y="516" fill="#9fb0aa" font-size="13">≈27° off · reads +22° (right) · catches 5/11 shifts · beats “no change” from 3h</text>
