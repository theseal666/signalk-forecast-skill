  <rect x="24" y="402" width="1464" height="60" rx="8" fill="#1a1a1a" stroke="#2a2a2a"/>
  <text x="52" y="439" fill="#666" font-size="22" font-weight="bold" text-anchor="middle">3</text>
  <text x="92" y="428" fill="#e8e8e8" font-size="16" font-weight="bold">DWD ICON</text>
