  <text x="537" y="628" fill="#e8e8e8" font-size="16" font-weight="bold">MET Norway Nordic</text>
  <text x="695" y="628" fill="#888" font-size="13">71%</text>

  <rect x="1014" y="582" width="474" height="58" rx="8" fill="#1a1a1a" stroke="#2a2a2a"/>
  <text x="1032" y="606" fill="#777" font-size="11" letter-spacing="1">DAY BEFORE · 24 H+</text>
  <text x="1032" y="628" fill="#e8e8e8" font-size="16" font-weight="bold">MET Norway Nordic</text>
