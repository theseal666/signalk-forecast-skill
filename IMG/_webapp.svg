<svg xmlns="http://www.w3.org/2000/svg" width="1512" height="712" viewBox="0 0 1512 712" font-family="DejaVu Sans, Verdana, sans-serif">
  <rect width="1512" height="712" fill="#121212"/>

  <!-- header -->
  <rect width="1512" height="88" fill="#1e1e1e"/>
