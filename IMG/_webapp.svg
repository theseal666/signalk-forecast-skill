  <text x="92" y="360" fill="#e8e8e8" font-size="16" font-weight="bold">ECMWF IFS 0.25°</text>
  <text x="92" y="380" fill="#9fb0aa" font-size="13">≈23° off · reads +12° (right) · catches 2/11 shifts · beats “no change” from 3h</text>
