<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forecast Skill</title>
    <link rel="stylesheet" href="style.css?v=0.5.0">
</head>
<body>
    <div id="dashboard">
        <header>
            <div class="brand">
                <img src="icon.png?v=0.5.0" alt="Forecast Skill">
                <span>FORECAST&nbsp;SKILL</span>
            </div>
            <div class="control">
                <label>Location</label>
                <select id="location-select"></select>
            </div>
            <div class="control">
                <label>Metric</label>
                <select id="metric-select">
                    <option value="score">Score (dir 70% + speed 30%)</option>
                    <option value="skill">Dir skill vs persistence</option>
                    <option value="dirMAE_deg">Direction error (°)</option>
                    <option value="dirBias_deg">Direction bias (°)</option>
                    <option value="speedMAE_ms">Speed error (m/s)</option>
                    <option value="vectorRMSE_ms">Vector RMSE (m/s)</option>
                </select>
            </div>
            <div class="control legend" id="window-info"></div>
        </header>
        <main>
            <div id="composite-panel">
                <div class="section-title">
                    Composite skill score
                    <span class="section-note"> — change-event accuracy, ≤ 48 h lead, 0–100 %</span>
                </div>
                <div id="composite-bars"></div>
            </div>
            <div class="section-title bucket-section-title">
                Per lead-time detail
                <span class="section-note" id="metric-label"></span>
            </div>
            <p id="hint"></p>
            <div id="chart"></div>
        </main>
    </div>
    <script src="app.js?v=0.5.0"></script>
</body>
</html>
